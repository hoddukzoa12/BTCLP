[package]
name = "btcfi_vault"
version = "0.1.0"
edition = "2024_07"
cairo-version = "2.14.0"
description = "BTCFi Strategy Vault - Auto LP/Lending switch on Starknet"
homepage = "https://github.com/hoddukzoa12/BTCLP"

[dependencies]
starknet = "2.14.0"
openzeppelin = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v3.0.0" }
alexandria_math = { git = "https://github.com/keep-starknet-strange/alexandria.git", tag = "v0.8.0" }
# ekubo interfaces are manually vendored in src/interfaces/ekubo.cairo
# EkuboProtocol/starknet-contracts does not expose a lib target for Scarb

[dev-dependencies]
snforge_std = "0.57.0"
cairo_test = "2.14.0"

[[target.starknet-contract]]
sierra = true
casm = false

[tool.scarb]
allow-prebuilt-plugins = ["snforge_std"]

[[tool.snforge.fork]]
name = "MAINNET_FORK"
url = "https://api.cartridge.gg/x/starknet/mainnet"
block_id.number = "7309600"

[[tool.snforge.fork]]
name = "SEPOLIA_FORK"
url = "https://rpc.starknet-testnet.lava.build:443/rpc/v0_7"
block_id.number = "7108100"
